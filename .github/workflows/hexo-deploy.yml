name: Hexo Deploy

on:
  push:
    branches:
      - hexo
  workflow_dispatch:

permissions:
  contents: write

env:
  GIT_USER: aemaeth
  GIT_EMAIL: monostablelss@gmail.com

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: hexo-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: hexo

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Remove Deploy_git
        run: rm -rf .deploy_git

      - name: Install dependencies
        run: npm ci

      - name: Check posts
        run: npm run check

      - name: Build site
        run: npm run build

      - name: Deploy generated site
        run: |
          git config --global user.name $GIT_USER
          git config --global user.email $GIT_EMAIL
          git fetch origin master --depth=1
          git worktree add /tmp/pages origin/master
          find /tmp/pages -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R public/. /tmp/pages/
          cd /tmp/pages
          git add -A
          git commit -m "Site updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || exit 0
          git push origin HEAD:master
